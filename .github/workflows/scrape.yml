name: 🎨 ART PRO – Daily Scraper (3 calendars)

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: 🐍 Setup Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🌐 Install Playwright browsers
        run: python -m playwright install chromium --with-deps

      - name: 🔍 Run Scraper
        run: python scraper.py

      - name: 📤 Create Pull Request with updated calendars
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "🔄 Auto-update all 3 calendars $(date +'%Y-%m-%d %H:%M UTC')"
          title: "🎨 Daily ART PRO update – $(date +'%Y-%m-%d')"
          body: "Updated Slovenia, EU and Global calendars."
          branch: auto-update-art-pro-calendars
          delete-branch: true
          base: main
          add-paths: |
            ART_PRO_SLOVENIA.ics
            ART_PRO_EU.ics
            ART_PRO_GLOBAL.ics
