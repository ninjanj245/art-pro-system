name: 🎨 ART PRO SYSTEM – Dnevni scraper

on:
  schedule:
    - cron: '0 7 * * *'   # every day at 07:00 UTC (08:00 Ljubljana)
  workflow_dispatch:        # manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Namesti odvisnosti
        run: pip install -r requirements.txt

      - name: 🔍 Zaženi scraper
        run: python scraper.py

      - name: 📤 Push .ics datoteke
        run: |
          git config user.name "ART PRO BOT"
          git config user.email "bot@artprosystem"
          git pull --rebase origin main
          git add ART_PRO_SLOVENIA.ics ART_PRO_EU.ics ART_PRO_GLOBAL.ics
          git diff --staged --quiet || git commit -m "🔄 Auto-update $(date +'%Y-%m-%d %H:%M')"
          git push --force-with-lease origin main
